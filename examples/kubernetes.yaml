apiVersion: v1
kind: Namespace
metadata:
  name: agora
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agora-data
  namespace: agora
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agora
  namespace: agora
  labels:
    app.kubernetes.io/name: agora
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: agora
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agora
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: agora
          image: ghcr.io/kelos-dev/agora:main
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: AGORA_ADDR
              value: 0.0.0.0:8080
            - name: AGORA_DATA
              value: /data/agora.jsonl
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: agora-data
---
apiVersion: v1
kind: Service
metadata:
  name: agora
  namespace: agora
  labels:
    app.kubernetes.io/name: agora
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agora
  ports:
    - name: http
      port: 80
      targetPort: http
